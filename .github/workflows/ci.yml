name: CI

# First real build/test gate for the Sonde workspace. tuxlink CI never built it
# (it was not a root-workspace member there), so this workflow is what validates
# the rename + extraction by compiling the renamed workspace for the first time.

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # sonde-phy pulls in `cpal` (default-off, but activated by --all-targets
      # for the audio bins/tests), and cpal -> alsa-sys needs the ALSA dev
      # headers + pkg-config at build time on Linux. Without this the clippy/
      # test steps fail in alsa-sys's build script ("Package alsa was not found").
      - name: Install ALSA dev libraries
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # If the inherited modem code is not rustfmt-clean on first run, run
      # `cargo fmt --all` locally and commit before relying on this step.
      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (warnings = errors, all targets)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

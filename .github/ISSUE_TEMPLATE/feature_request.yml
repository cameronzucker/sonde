name: Feature request
description: Propose an enhancement to Sonde
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that Sonde doesn't support today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to see. Note if it touches the PHY/FEC waveform contract or any transmit path.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why you set them aside.
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        Substantial design changes are recorded as ADRs (see `docs/adr/`); large
        features may warrant one. Anything that can cause a transmission must
        respect RADIO-1 (see SECURITY.md / CLAUDE.md).
